<!DOCTYPE html>
<html>
<head>
    <title>Canva Signage Loop</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: black; }
        iframe { width: 100vw; height: 100vh; border: none; }
    </style>
</head>
<body>
    <iframe id="display" src="https://www.canva.com/design/DAGxFBs3g6s/view?embed&autoplay=1"></iframe>

    <script>
        // Canva often pauses after 1 hour or if the tab loses focus.
        // This script "pings" the iframe to stay alive.
        setInterval(() => {
            const frame = document.getElementById('display');
            // Refreshing the SRC is the only way to force a loop 
            // if Canva's internal "Play on repeat" fails.
            frame.src = "https://www.canva.com/design/DAGxFBs3g6s/view?embed&autoplay=1";
            console.log("Loop forced at: " + new Date().toLocaleTimeString());
        }, 300000); // Refreshes every 5 minutes
    </script>
</body>
</html>
