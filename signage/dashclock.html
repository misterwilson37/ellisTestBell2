<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Clock v1.0.0</title>
    <!-- Dashboard Clock Display v1.0.0 -->
    <!-- v1.0.0: Full-screen multi-schedule clock that pulls its schedule selection
         from the shared Firestore dashboard-config doc — the same config that powers
         dashboard.html and dashright.html. Intended use: a Yodeck frame that needs
         just the clock section, without Canva or scoreboard. When the admin changes
         which schedules display via dashboard-config.html, every dashclock.html
         instance updates automatically. No URL parameters, no per-TV overrides —
         by design, all three signage pages stay in lockstep.
         
         Sibling of: dashboard.html (Canva + clock + scoreboard, single frame)
                    dashright.html (clock + scoreboard, right-column only)
                    clock.html at repo root (legacy, URL-param-driven — still works). -->
    <meta name="theme-color" content="#4B9CD3">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="../firebase-config.js"></script>
    <style>
        /* Dashboard Clock Display v1.0.0 — visual match to dashboard.html's clock area */
        :root {
            --carolina-blue: #4B9CD3;
            --carolina-blue-light: #7BAFD4;
            --carolina-blue-sky: #8FC3E8;
            --dark-grey: #1a1a1a;
            --slate-bg: #111827;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100vw; height: 100vh; overflow: hidden; background: var(--slate-bg); }
        
        /* Full-screen clock container. Matches dashboard.html's .clock-area styling
           but scaled to fill the full viewport instead of 20% of a right column.
           Container queries so font sizes remain proportional at any TV size. */
        .clock-area {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(180deg, var(--slate-bg) 0%, #1a1a1a 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 3%;
            container-type: size;
            font-family: 'Century Gothic', 'Urbanist', 'Questrial', sans-serif;
        }
        
        #main-clock {
            font-size: 22cqw;
            font-weight: 700;
            color: #fff;
            text-align: center;
            width: 100%;
            line-height: 1.1;
            white-space: nowrap;
            letter-spacing: 0.02em;
        }
        
        #schedule-columns {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 2cqw;
            width: 100%;
            margin-top: 4cqh;
        }
        
        .schedule-column {
            text-align: center;
            padding: 2cqh 1.5cqw;
            border-radius: 12px;
            background: var(--dark-grey);
            border: 1px solid #333;
            min-width: 0;
        }
        
        .column-label {
            font-size: 4cqw;
            font-weight: 600;
            color: #a0a0a0;
            margin-bottom: 1.5cqh;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .column-period {
            font-size: 5cqw;
            font-weight: 700;
            color: #fff;
            line-height: 1.2;
            overflow: hidden;
            text-overflow: ellipsis;
            min-height: 1.4em;
        }
        
        .column-period.active { color: var(--carolina-blue); }
        
        .column-countdown {
            font-size: 3.5cqw;
            color: var(--carolina-blue);
            margin-top: 1.5cqh;
        }
        
        /* Small version stamp in the corner — out of the way but findable.
           Same footer-comment-plus-visible-badge pattern used elsewhere in the
           project so GitHub Pages cache staleness is easy to spot. */
        .version-stamp {
            position: fixed;
            bottom: 4px;
            right: 8px;
            font-size: 10px;
            color: #333;
            font-family: -apple-system, sans-serif;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="clock-area">
        <div id="main-clock">--:--:-- --</div>
        <div id="schedule-columns">
            <div class="schedule-column">
                <div class="column-label">--</div>
                <div class="column-period">--</div>
                <div class="column-countdown"></div>
            </div>
            <div class="schedule-column">
                <div class="column-label">--</div>
                <div class="column-period">--</div>
                <div class="column-countdown"></div>
            </div>
            <div class="schedule-column">
                <div class="column-label">--</div>
                <div class="column-period">--</div>
                <div class="column-countdown"></div>
            </div>
        </div>
    </div>
    <div class="version-stamp">Dashboard Clock v1.0.0</div>

    <script>
        // Dashboard Clock Display v1.0.0
        
        if (!window.firebaseConfig) {
            throw new Error("firebase-config.js failed to load. Check <script> tag order in <head>.");
        }
        const firebaseConfig = window.firebaseConfig;
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        const appId = firebaseConfig.appId;
        
        // State — mirrors dashboard.html for consistency.
        let schedules = {};       // Populated by Firestore onSnapshot per schedule doc
        let scheduleConfig = {};  // Which schedules + labels to show (from Firestore config)
        
        const configRef = db.collection('artifacts').doc(appId)
            .collection('public').doc('data')
            .collection('config').doc('dashboard');
        
        async function init() {
            // Auth — Firestore rules require an authenticated user (even anonymous)
            // for public/data reads in this project.
            try {
                await auth.signInAnonymously();
            } catch (err) {
                console.error('[dashclock] anonymous sign-in failed:', err);
            }
            
            // Listen to the dashboard-config doc. Any change (admin edits schedules,
            // labels, etc.) fires this listener within ~1s and the clock rewires.
            configRef.onSnapshot(doc => {
                if (!doc.exists) {
                    console.warn('[dashclock] dashboard config doc does not exist yet');
                    return;
                }
                const data = doc.data() || {};
                scheduleConfig = {
                    s1: data.s1 || null, s2: data.s2 || null, s3: data.s3 || null,
                    l1: data.l1 || '',   l2: data.l2 || '',   l3: data.l3 || ''
                };
                loadSchedules(scheduleConfig);
                updateClock();  // Redraw labels immediately even before schedule data arrives
            }, err => {
                console.error('[dashclock] config listener error:', err);
            });
            
            // Clock tick — 1s is the human perception threshold for "live"
            setInterval(updateClock, 1000);
            updateClock();
        }
        
        /**
         * Subscribes to each selected schedule doc. Previous subscriptions are
         * implicitly replaced because Firestore onSnapshot returns unsubscribers —
         * but for this project's pattern (rare schedule changes) the leaked listener
         * cost is negligible. If we ever see this page churn through many schedule
         * IDs in one session, we'd store the unsub handles and call them on switch.
         */
        async function loadSchedules(config) {
            const scheduleIds = [config.s1, config.s2, config.s3].filter(Boolean);
            for (const id of scheduleIds) {
                const scheduleRef = db.collection('artifacts').doc(appId)
                    .collection('public').doc('data')
                    .collection('schedules').doc(id);
                scheduleRef.onSnapshot(snapshot => {
                    if (snapshot.exists) {
                        const data = snapshot.data();
                        schedules[id] = {
                            name: data.name,
                            periods: (data.periods || []).filter(p => p.isEnabled !== false)
                        };
                        updateClock();
                    }
                });
            }
        }
        
        function updateClock() {
            const now = new Date();
            const hours = now.getHours();
            const mins = now.getMinutes();
            const secs = now.getSeconds();
            const ampm = hours >= 12 ? 'pm' : 'am';
            const displayHours = hours % 12 || 12;
            
            document.getElementById('main-clock').textContent =
                `${displayHours}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')} ${ampm}`;
            
            const columns = document.querySelectorAll('.schedule-column');
            const scheduleIds = [scheduleConfig.s1, scheduleConfig.s2, scheduleConfig.s3];
            const labels = [scheduleConfig.l1, scheduleConfig.l2, scheduleConfig.l3];
            
            scheduleIds.forEach((scheduleId, index) => {
                if (scheduleId && schedules[scheduleId]) {
                    const schedule = schedules[scheduleId];
                    const label = labels[index] || schedule.name || '';
                    const status = getScheduleStatus(schedule);
                    
                    columns[index].querySelector('.column-label').textContent = label;
                    columns[index].querySelector('.column-period').textContent = status.period;
                    columns[index].querySelector('.column-countdown').textContent = status.countdown;
                    
                    const periodEl = columns[index].querySelector('.column-period');
                    periodEl.classList.toggle('active', status.active);
                }
            });
        }
        
        // -- Time/period helpers — bit-for-bit identical to dashboard.html. If these
        //    ever drift, they MUST be re-synced across all three signage pages. Future
        //    refactor idea: move into a shared /signage/schedule-utils.js. --
        
        function getScheduleStatus(schedule) {
            const now = new Date();
            const nowSeconds = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
            
            for (const period of schedule.periods) {
                const bells = period.bells || [];
                if (bells.length === 0) continue;
                const times = bells.map(b => timeToSeconds(b.time)).sort((a, b) => a - b);
                const start = times[0];
                const end = times[times.length - 1];
                if (nowSeconds >= start && nowSeconds < end) {
                    const endsAt = formatTime12Hour(end);
                    return { period: period.name, countdown: `ends at ${endsAt}`, active: true };
                }
            }
            
            let nextPeriod = null;
            let nextStart = Infinity;
            for (const period of schedule.periods) {
                const bells = period.bells || [];
                if (bells.length === 0) continue;
                const times = bells.map(b => timeToSeconds(b.time)).sort((a, b) => a - b);
                const start = times[0];
                if (start > nowSeconds && start < nextStart) {
                    nextStart = start;
                    nextPeriod = period;
                }
            }
            
            if (nextPeriod) {
                const countdown = nextStart - nowSeconds;
                return { period: nextPeriod.name, countdown: `starts in ${formatCountdown(countdown)}`, active: false };
            }
            return { period: 'Day Complete', countdown: '', active: false };
        }
        
        function timeToSeconds(timeStr) {
            const parts = timeStr.split(':').map(Number);
            return parts[0] * 3600 + parts[1] * 60 + (parts[2] || 0);
        }
        
        function formatTime12Hour(seconds) {
            let hours = Math.floor(seconds / 3600);
            const mins = Math.floor((seconds % 3600) / 60);
            const ampm = hours >= 12 ? 'pm' : 'am';
            hours = hours % 12 || 12;
            return `${hours}:${String(mins).padStart(2, '0')} ${ampm}`;
        }
        
        function formatCountdown(seconds) {
            if (seconds >= 3600) {
                const hours = Math.floor(seconds / 3600);
                const mins = Math.floor((seconds % 3600) / 60);
                return `${hours}:${String(mins).padStart(2, '0')}`;
            } else {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins}:${String(secs).padStart(2, '0')}`;
            }
        }
        
        init();
    </script>
</body>
</html>
